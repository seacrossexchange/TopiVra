version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      DATABASE_URL: mysql://root:password@db:3306/topter_c2c
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-key-for-testing-only-32chars
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: dev-refresh-secret-key-for-testing-only-32chars
      JWT_REFRESH_EXPIRES_IN: 30d
      APP_PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5174
      API_VERSION: v1
      PLATFORM_FEE_RATE: 0.05
      MIN_WITHDRAWAL_AMOUNT: 10
      WITHDRAWAL_FEE_RATE: 0.01
      ORDER_AUTO_CANCEL_MINUTES: 30
      ORDER_AUTO_CONFIRM_DAYS: 7
      PAYMENT_EXPIRATION_MINUTES: 30
      MAX_REFUND_DAYS: 7
    network_mode: service:db
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: topter_c2c
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - 3306:3306

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
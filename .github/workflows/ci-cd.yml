name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: ${{ github.repository }}/server
  CLIENT_IMAGE_NAME: ${{ github.repository }}/client

jobs:
  # ==================== 测试阶段 ====================
  
  test-server:
    name: 测试后端
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 安装依赖
        working-directory: ./server
        run: npm ci

      - name: 代码检查
        working-directory: ./server
        run: npm run lint

      - name: 单元测试
        working-directory: ./server
        run: npm run test

      - name: E2E 测试
        working-directory: ./server
        run: npm run test:e2e

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v3
        with:
          files: ./server/coverage/lcov.info
          flags: server

  test-client:
    name: 测试前端
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 安装依赖
        working-directory: ./client
        run: npm ci

      - name: 代码检查
        working-directory: ./client
        run: npm run lint

      - name: 单元测试
        working-directory: ./client
        run: npm run test

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v3
        with:
          files: ./client/coverage/lcov.info
          flags: client

  test-e2e:
    name: E2E 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: 安装依赖
        working-directory: ./e2e
        run: npm ci

      - name: 安装 Playwright 浏览器
        working-directory: ./e2e
        run: npx playwright install --with-deps

      - name: 运行 E2E 测试
        working-directory: ./e2e
        run: npm run test

      - name: 上传测试报告
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 npm audit
        run: |
          cd server && npm audit --audit-level=high || true
          cd ../client && npm audit --audit-level=high || true

      - name: 运行 Trivy 漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 上传 Trivy 结果到 GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== 构建阶段 ====================
  
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: [test-server, test-client, test-e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据（服务端）
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 构建并推送服务端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 提取元数据（客户端）
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 构建并推送客户端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署阶段 ====================
  
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: http://${{ secrets.DEV_SERVER_IP }}
    steps:
      - name: 部署到开发服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_IP }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
          script: |
            cd /opt/topivra-dev
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T server npx prisma migrate deploy

  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: http://${{ secrets.STAGING_SERVER_IP }}
    steps:
      - name: 部署到测试服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_SERVER_IP }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}
          script: |
            cd /opt/topivra-staging
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T server npx prisma migrate deploy

  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://topivra.com
    steps:
      - name: 零停机部署到生产服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          script: |
            cd /opt/topivra
            ./scripts/deploy-zero-downtime.sh

      - name: 发送部署通知
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: '生产环境部署 ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}


















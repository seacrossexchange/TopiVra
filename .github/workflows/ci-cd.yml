name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies (Server)
        working-directory: ./server
        run: npm ci
      
      - name: Install dependencies (Client)
        working-directory: ./client
        run: npm ci
      
      - name: Lint Server
        working-directory: ./server
        run: npm run lint
      
      - name: Lint Client
        working-directory: ./client
        run: npm run lint
      
      - name: Check TypeScript
        working-directory: ./server
        run: npm run build
      
      - name: Check TypeScript (Client)
        working-directory: ./client
        run: npm run build

  # ==================== 安全扫描 ====================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run npm audit (Server)
        working-directory: ./server
        run: npm audit --audit-level=high
        continue-on-error: true
      
      - name: Run npm audit (Client)
        working-directory: ./client
        run: npm audit --audit-level=high
        continue-on-error: true
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== 单元测试 ====================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: topivra_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies (Server)
        working-directory: ./server
        run: npm ci
      
      - name: Run Prisma migrations
        working-directory: ./server
        env:
          DATABASE_URL: mysql://root:test_password@localhost:3306/topivra_test
        run: npx prisma migrate deploy
      
      - name: Run unit tests
        working-directory: ./server
        env:
          DATABASE_URL: mysql://root:test_password@localhost:3306/topivra_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret_key_for_ci_testing_only
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_for_ci_testing_only
        run: npm run test:cov
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Run client tests
        working-directory: ./client
        run: npm run test -- --run --coverage
      
      - name: Upload client coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./client/coverage/lcov.info
          flags: client
          fail_ci_if_error: false

  # ==================== E2E 测试 ====================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Start services
        run: |
          docker-compose -f config/docker-compose.yml up -d
          sleep 30
      
      - name: Install E2E dependencies
        working-directory: ./e2e
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps
      
      - name: Run E2E tests
        working-directory: ./e2e
        run: npx playwright test
      
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
      
      - name: Stop services
        if: always()
        run: docker-compose -f config/docker-compose.yml down

  # ==================== 代码质量分析 ====================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test-unit]
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=topivra
            -Dsonar.sources=server/src,client/src
            -Dsonar.tests=server/test,client/src/__tests__
            -Dsonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx
      
      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==================== Docker 构建 ====================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, security, test-unit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/topivra-server:latest
            ${{ secrets.DOCKER_USERNAME }}/topivra-server:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/topivra-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/topivra-server:buildcache,mode=max
      
      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/topivra-client:latest
            ${{ secrets.DOCKER_USERNAME }}/topivra-client:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/topivra-client:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/topivra-client:buildcache,mode=max

  # ==================== 部署到生产环境 ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker, test-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://topivra.com
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/topivra
            git pull origin main
            docker-compose -f config/docker-compose.prod.yml pull
            docker-compose -f config/docker-compose.prod.yml up -d
            docker-compose -f config/docker-compose.prod.yml exec -T server npx prisma migrate deploy
      
      - name: Health check
        run: |
          sleep 30
          curl -f https://topivra.com/health || exit 1
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Deployment to production: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ==================== 性能测试 ====================
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://topivra.com
            https://topivra.com/products
            https://topivra.com/login
          uploadArtifacts: true
          temporaryPublicStorage: true

name: Deploy Pipeline

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ${{ github.repository }}/server
  CLIENT_IMAGE: ${{ github.repository }}/client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend, e2e-test] # Ensure all CI tests pass
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notification:
    runs-on: ubuntu-latest
    needs: [build-and-push] # Run after build-and-push completes
    if: success() # Only run if the previous job succeeded
    steps:
      - name: Deployment Success Notification
        run: echo "Deployment for version ${{ github.ref_name }} to GitHub Container Registry successful!"
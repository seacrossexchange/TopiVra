# ============================================================
# TopiVra GitLab CI/CD 配置
# 版本：v1.0
# 说明：自动化构建、测试、部署流程
# ============================================================

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  SERVER_IMAGE: $CI_REGISTRY_IMAGE/server:$CI_COMMIT_SHORT_SHA
  CLIENT_IMAGE: $CI_REGISTRY_IMAGE/client:$CI_COMMIT_SHORT_SHA
  LATEST_SERVER_IMAGE: $CI_REGISTRY_IMAGE/server:latest
  LATEST_CLIENT_IMAGE: $CI_REGISTRY_IMAGE/client:latest

# ==================== 测试阶段 ====================

test:server:
  stage: test
  image: node:18-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}-server
    paths:
      - server/node_modules/
  before_script:
    - cd server
    - npm ci
  script:
    - npm run lint
    - npm run test
    - npm run test:e2e
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: server/coverage/cobertura-coverage.xml
  only:
    - merge_requests
    - main
    - develop

test:client:
  stage: test
  image: node:18-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}-client
    paths:
      - client/node_modules/
  before_script:
    - cd client
    - npm ci
  script:
    - npm run lint
    - npm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: client/coverage/cobertura-coverage.xml
  only:
    - merge_requests
    - main
    - develop

# E2E 测试
test:e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  cache:
    key: ${CI_COMMIT_REF_SLUG}-e2e
    paths:
      - e2e/node_modules/
  before_script:
    - cd e2e
    - npm ci
  script:
    - npm run test
  artifacts:
    when: always
    paths:
      - e2e/test-results/
      - e2e/playwright-report/
    expire_in: 30 days
  only:
    - merge_requests
    - main

# 安全扫描
security:scan:
  stage: test
  image: node:18-alpine
  script:
    - cd server && npm audit --audit-level=high
    - cd ../client && npm audit --audit-level=high
  allow_failure: true
  only:
    - merge_requests
    - main

# ==================== 构建阶段 ====================

build:server:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd server
    - docker build -t $SERVER_IMAGE -t $LATEST_SERVER_IMAGE .
    - docker push $SERVER_IMAGE
    - docker push $LATEST_SERVER_IMAGE
  only:
    - main
    - develop
    - tags

build:client:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd client
    - docker build -t $CLIENT_IMAGE -t $LATEST_CLIENT_IMAGE .
    - docker push $CLIENT_IMAGE
    - docker push $LATEST_CLIENT_IMAGE
  only:
    - main
    - develop
    - tags

# ==================== 部署阶段 ====================

# 部署到开发环境
deploy:dev:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_DEV" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEV_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEV_SERVER_USER@$DEV_SERVER_IP << 'EOF'
        cd /opt/topivra-dev
        docker-compose pull
        docker-compose up -d
        docker-compose exec -T server npx prisma migrate deploy
      EOF
  environment:
    name: development
    url: http://$DEV_SERVER_IP
  only:
    - develop
  when: manual

# 部署到测试环境
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_STAGING" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh $STAGING_SERVER_USER@$STAGING_SERVER_IP << 'EOF'
        cd /opt/topivra-staging
        docker-compose pull
        docker-compose up -d
        docker-compose exec -T server npx prisma migrate deploy
      EOF
  environment:
    name: staging
    url: http://$STAGING_SERVER_IP
  only:
    - main
  when: manual

# 部署到生产环境（零停机）
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $PROD_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_SERVER_USER@$PROD_SERVER_IP << 'EOF'
        cd /opt/topivra
        ./scripts/deploy-zero-downtime.sh
      EOF
  environment:
    name: production
    url: https://topivra.com
  only:
    - tags
  when: manual

# 回滚生产环境
rollback:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $PROD_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_SERVER_USER@$PROD_SERVER_IP << 'EOF'
        cd /opt/topivra
        ./scripts/rollback.sh
      EOF
  environment:
    name: production
    url: https://topivra.com
  only:
    - tags
  when: manual


















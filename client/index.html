<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 防主题闪烁：在 CSS/JS 加载前立即设置主题 -->
    <script>
      (function() {
        var stored = localStorage.getItem('topivra-theme');
        var isDark;
        if (stored === 'dark') {
          isDark = true;
        } else if (stored === 'light') {
          isDark = false;
        } else {
          // system 或未设置，跟随系统
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        // 暗色时移除 data-theme（:root 默认暗色），亮色时设置 light
        if (!isDark) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

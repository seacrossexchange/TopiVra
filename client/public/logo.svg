<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- 圆角矩形底板渐变：暖珊瑚→活力玫红→暖紫 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A5C"/>
      <stop offset="48%" stop-color="#FF4D8C"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- 顶部高光（磨砂玻璃感） -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- T 字：白→暖金 -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#FFF3DC"/>
      <stop offset="100%" stop-color="#FFD98A"/>
    </linearGradient>
    <filter id="ts" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#3B0764" flood-opacity="0.55"/>
    </filter>
    <filter id="bg-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 圆角矩形底板 -->
  <rect x="1" y="1" width="30" height="30" rx="8" ry="8" fill="url(#bg)"/>
  <!-- 顶部磨砂高光 -->
  <rect x="1" y="1" width="30" height="30" rx="8" ry="8" fill="url(#gloss)"/>
  <!-- 内描边精致感 -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" ry="7.5" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>

  <!-- T 字路径：横笔宽、竖笔有重量感，比例黄金 -->
  <g filter="url(#ts)">
    <path d="
      M6.5 9
      L6.5 12.2
      Q6.5 13 7.3 13
      L13.2 13
      L13.2 23.2
      Q13.2 24 14 24
      L18 24
      Q18.8 24 18.8 23.2
      L18.8 13
      L24.7 13
      Q25.5 13 25.5 12.2
      L25.5 9
      Q25.5 8 24.5 8
      L7.5 8
      Q6.5 8 6.5 9 Z"
      fill="url(#tg)"
    />
  </g>
</svg>

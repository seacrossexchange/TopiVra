version: '3.8'

# ============================================================
# TopiVra 开发环境配置
# 使用方式：docker-compose up -d
# 特点：快速启动、热重载、便于调试
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: topivra-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: topivra
      MYSQL_USER: topivra_dev
      MYSQL_PASSWORD: topivra_dev_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - topivra-network

  redis:
    image: redis:7-alpine
    container_name: topivra-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - topivra-network

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: topivra-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    working_dir: /app
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=mysql://topivra_dev:topivra_dev_pass@mysql:3306/topivra
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret-key-change-in-production-2024
      - JWT_REFRESH_SECRET=dev-jwt-refresh-secret-key-change-in-production-2024
      - ENCRYPTION_KEY=dev-encryption-key-32-chars-min-2024
      - CLIENT_URL=http://localhost:5174
      - FRONTEND_URL=http://localhost:5174
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_CALLBACK_URL=http://localhost:3001/api/v1/auth/google/callback
      - USDT_WALLET_ADDRESS=
      - USDT_CALLBACK_SECRET=
      - ENABLE_SWAGGER=true
      - SENTRY_DSN=
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - topivra-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  client:
    build:
      context: ../client
      dockerfile: Dockerfile.dev
    container_name: topivra-client
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE_URL=http://localhost:3001/api/v1
      - VITE_WS_URL=ws://localhost:3001
      - VITE_GOOGLE_CLIENT_ID=
      - VITE_TELEGRAM_BOT_NAME=
      - VITE_ENABLE_TELEGRAM_LOGIN=false
      - VITE_ENABLE_2FA=false
    depends_on:
      - server
    networks:
      - topivra-network

  nginx:
    image: nginx:alpine
    container_name: topivra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
    networks:
      - topivra-network

volumes:
  mysql_data:
  redis_data:

networks:
  topivra-network:
    driver: bridge

# ============================================================
# TopiVra Kubernetes 部署配置（K3s）
# 版本：v1.0
# 说明：轻量级 Kubernetes 集群部署方案
# ============================================================

# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: topivra

---
# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: topivra-config
  namespace: topivra
data:
  NODE_ENV: "production"
  DATABASE_HOST: "mysql"
  DATABASE_PORT: "3306"
  DATABASE_NAME: "topivra"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

---
# Secret - 敏感信息
apiVersion: v1
kind: Secret
metadata:
  name: topivra-secret
  namespace: topivra
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "your-mysql-root-password"
  MYSQL_PASSWORD: "your-mysql-password"
  REDIS_PASSWORD: "your-redis-password"
  JWT_SECRET: "your-jwt-secret"
  JWT_REFRESH_SECRET: "your-jwt-refresh-secret"

---
# PersistentVolumeClaim - MySQL 数据
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: topivra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# PersistentVolumeClaim - Redis 数据
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: topivra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# PersistentVolumeClaim - 上传文件
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: topivra
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi

---
# Deployment - MySQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: topivra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: topivra-secret
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          value: topivra
        - name: MYSQL_USER
          value: topivra
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: topivra-secret
              key: MYSQL_PASSWORD
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc

---
# Service - MySQL
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: topivra
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  clusterIP: None

---
# Deployment - Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: topivra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: topivra-secret
              key: REDIS_PASSWORD
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Service - Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: topivra
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None

---
# Deployment - Server (后端)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: topivra
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: topivra-server:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: topivra-config
        env:
        - name: DATABASE_URL
          value: "mysql://topivra:$(MYSQL_PASSWORD)@mysql:3306/topivra"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: topivra-secret
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: topivra-secret
              key: JWT_REFRESH_SECRET
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc

---
# Service - Server
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: topivra
spec:
  selector:
    app: server
  ports:
  - port: 3001
    targetPort: 3001

---
# Deployment - Client (前端)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: topivra
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: topivra-client:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Service - Client
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: topivra
spec:
  selector:
    app: client
  ports:
  - port: 80
    targetPort: 80

---
# Ingress - 外部访问
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: topivra-ingress
  namespace: topivra
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - topivra.com
    - www.topivra.com
    secretName: topivra-tls
  rules:
  - host: topivra.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: server
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: client
            port:
              number: 80

---
# HorizontalPodAutoscaler - 自动扩缩容（后端）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-hpa
  namespace: topivra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# HorizontalPodAutoscaler - 自动扩缩容（前端）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: client-hpa
  namespace: topivra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: client
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70


















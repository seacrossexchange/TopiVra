groups:
  - name: topivra_alerts
    interval: 30s
    rules:
      # ==================== 服务可用性告警 ====================
      
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 已停止"
          description: "{{ $labels.instance }} 的 {{ $labels.job }} 服务已停止超过 1 分钟"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "高错误率检测"
          description: "{{ $labels.instance }} 的错误率超过 5%"

      # ==================== 系统资源告警 ====================
      
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "{{ $labels.instance }} 的 CPU 使用率超过 80%，当前值: {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "{{ $labels.instance }} 的内存使用率超过 85%，当前值: {{ $value }}%"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘空间不足"
          description: "{{ $labels.instance }} 的磁盘使用率超过 80%，当前值: {{ $value }}%"

      - alert: DiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间严重不足"
          description: "{{ $labels.instance }} 的磁盘使用率超过 90%，当前值: {{ $value }}%"

      # ==================== 数据库告警 ====================
      
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL 数据库已停止"
          description: "{{ $labels.instance }} 的 MySQL 服务已停止"

      - alert: MySQLTooManyConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 连接数过高"
          description: "{{ $labels.instance }} 的 MySQL 连接数超过 80%，当前值: {{ $value }}%"

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 慢查询过多"
          description: "{{ $labels.instance }} 的慢查询率: {{ $value }}/s"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 服务已停止"
          description: "{{ $labels.instance }} 的 Redis 服务已停止"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "{{ $labels.instance }} 的 Redis 内存使用率超过 90%，当前值: {{ $value }}%"

      # ==================== 容器告警 ====================
      
      - alert: ContainerDown
        expr: absent(container_last_seen{name=~"topivra-.*"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "容器已停止"
          description: "容器 {{ $labels.name }} 已停止"

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"topivra-.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器 CPU 使用率过高"
          description: "容器 {{ $labels.name }} 的 CPU 使用率超过 80%"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~"topivra-.*"} / container_spec_memory_limit_bytes{name=~"topivra-.*"} * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器内存使用率过高"
          description: "容器 {{ $labels.name }} 的内存使用率超过 90%"

      # ==================== 应用告警 ====================
      
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过长"
          description: "{{ $labels.instance }} 的 P95 响应时间超过 1 秒，当前值: {{ $value }}s"

      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "请求量激增"
          description: "{{ $labels.instance }} 的请求率超过 1000 req/s，当前值: {{ $value }}"

      # ==================== 备份告警 ====================
      
      - alert: BackupFailed
        expr: time() - backup_last_success_timestamp_seconds > 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "备份失败或未执行"
          description: "{{ $labels.instance }} 的备份已超过 24 小时未成功执行"

      # ==================== SSL 证书告警 ====================
      
      - alert: SSLCertificateExpiringSoon
        expr: (ssl_certificate_expiry_seconds - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL 证书即将过期"
          description: "{{ $labels.instance }} 的 SSL 证书将在 {{ $value }} 天后过期"

      - alert: SSLCertificateExpired
        expr: ssl_certificate_expiry_seconds - time() < 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SSL 证书已过期"
          description: "{{ $labels.instance }} 的 SSL 证书已过期"


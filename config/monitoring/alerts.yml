groups:
  - name: topivra_alerts
    interval: 30s
    rules:
      # ==================== 服务可用性告警 ====================
      
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 已停止"
          description: "{{ $labels.instance }} 的 {{ $labels.job }} 服务已停止超过 1 分钟"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "高错误率检测"
          description: "{{ $labels.instance }} 的错误率超过 5%"

      # ==================== 系统资源告警 ====================
      
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "{{ $labels.instance }} 的 CPU 使用率超过 80%，当前值: {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "{{ $labels.instance }} 的内存使用率超过 85%，当前值: {{ $value }}%"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘空间不足"
          description: "{{ $labels.instance }} 的磁盘使用率超过 80%，当前值: {{ $value }}%"

      - alert: DiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间严重不足"
          description: "{{ $labels.instance }} 的磁盘使用率超过 90%，当前值: {{ $value }}%"

      # ==================== 数据库告警 ====================
      
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL 数据库已停止"
          description: "{{ $labels.instance }} 的 MySQL 服务已停止"

      - alert: MySQLTooManyConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 连接数过高"
          description: "{{ $labels.instance }} 的 MySQL 连接数超过 80%，当前值: {{ $value }}%"

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 慢查询过多"
          description: "{{ $labels.instance }} 的慢查询率: {{ $value }}/s"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 服务已停止"
          description: "{{ $labels.instance }} 的 Redis 服务已停止"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "{{ $labels.instance }} 的 Redis 内存使用率超过 90%，当前值: {{ $value }}%"

      # ==================== 容器告警 ====================
      
      - alert: ContainerDown
        expr: absent(container_last_seen{name=~"topivra-.*"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "容器已停止"
          description: "容器 {{ $labels.name }} 已停止"

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"topivra-.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器 CPU 使用率过高"
          description: "容器 {{ $labels.name }} 的 CPU 使用率超过 80%"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~"topivra-.*"} / container_spec_memory_limit_bytes{name=~"topivra-.*"} * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器内存使用率过高"
          description: "容器 {{ $labels.name }} 的内存使用率超过 90%"

      # ==================== 应用告警 ====================
      
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过长"
          description: "{{ $labels.instance }} 的 P95 响应时间超过 1 秒，当前值: {{ $value }}s"

      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "请求量激增"
          description: "{{ $labels.instance }} 的请求率超过 1000 req/s，当前值: {{ $value }}"

      # ==================== 备份告警 ====================
      
      - alert: BackupFailed
        expr: time() - backup_last_success_timestamp_seconds > 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "备份失败或未执行"
          description: "{{ $labels.instance }} 的备份已超过 24 小时未成功执行"

      # ==================== SSL 证书告警 ====================
      
      - alert: SSLCertificateExpiringSoon
        expr: (ssl_certificate_expiry_seconds - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL 证书即将过期"
          description: "{{ $labels.instance }} 的 SSL 证书将在 {{ $value }} 天后过期"

      - alert: SSLCertificateExpired
        expr: ssl_certificate_expiry_seconds - time() < 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SSL 证书已过期"
          description: "{{ $labels.instance }} 的 SSL 证书已过期"

      # ==================== 业务指标告警 ====================
      
      - alert: HighPaymentFailureRate
        expr: rate(payment_failures_total[10m]) / rate(payment_attempts_total[10m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "支付失败率过高"
          description: "支付失败率超过 10%，当前值: {{ $value | humanizePercentage }}"

      - alert: LowInventoryStock
        expr: product_inventory_available < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "商品库存不足"
          description: "商品 {{ $labels.product_id }} 库存不足 10 件，当前: {{ $value }}"

      - alert: HighRefundRate
        expr: rate(refund_requests_total[1h]) / rate(orders_completed_total[1h]) > 0.2
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "退款率过高"
          description: "退款率超过 20%，当前值: {{ $value | humanizePercentage }}"

      - alert: AutoDeliveryFailureRate
        expr: rate(auto_delivery_failures_total[10m]) / rate(auto_delivery_attempts_total[10m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "自动发货失败率过高"
          description: "自动发货失败率超过 5%，当前值: {{ $value | humanizePercentage }}"

      - alert: UnprocessedOrders
        expr: orders_pending_payment_count > 100
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "待支付订单积压"
          description: "待支付订单数量超过 100，当前: {{ $value }}"

      - alert: SellerResponseTimeSlow
        expr: avg(seller_response_time_seconds) > 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "卖家响应时间过长"
          description: "平均响应时间超过 1 小时，当前: {{ $value | humanizeDuration }}"

      - alert: HighLoginFailureRate
        expr: rate(login_failures_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "登录失败率异常"
          description: "可能存在暴力破解攻击，失败率: {{ $value }}/s"

      - alert: DatabaseConnectionPoolExhausted
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "数据库连接池即将耗尽"
          description: "连接池使用率超过 95%，当前: {{ $value | humanizePercentage }}"

      - alert: RedisConnectionPoolExhausted
        expr: redis_connected_clients / redis_config_maxclients > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis 连接池即将耗尽"
          description: "连接池使用率超过 90%，当前: {{ $value | humanizePercentage }}"

      - alert: QueueBacklog
        expr: bull_queue_waiting_count > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "队列积压严重"
          description: "队列 {{ $labels.queue_name }} 积压超过 1000 个任务，当前: {{ $value }}"

      - alert: WebSocketConnectionsHigh
        expr: websocket_connections_active > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket 连接数过高"
          description: "活跃 WebSocket 连接数超过 10000，当前: {{ $value }}"

      - alert: APIRateLimitExceeded
        expr: rate(rate_limit_exceeded_total[5m]) > 100
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "API 限流触发频繁"
          description: "限流触发频率: {{ $value }}/s"


events {
    worker_connections 1024;
}

http {
# Topter C2C — Nginx Production Config
# Usage: docker-compose volume mount to /etc/nginx/conf.d/default.conf

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Upstream backends
upstream backend {
    server server:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
# ⚠️ 部署时替换为真实证书路径
server {
   listen 443 ssl http2;
   server_name _;

   # SSL - 部署时替换为真实证书路径
   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
   ssl_protocols       TLSv1.2 TLSv1.3;
   ssl_ciphers         HIGH:!aNULL:!MD5;
   ssl_prefer_server_ciphers on;
   ssl_session_cache   shared:SSL:10m;
   ssl_session_timeout 10m;
   ssl_stapling on;
   ssl_stapling_verify on;

   root /usr/share/nginx/html;
   index index.html;

   # Gzip
   gzip on;
   gzip_vary on;
   gzip_min_length 1024;
   gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

   # Security headers
   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
   add_header X-Frame-Options "SAMEORIGIN" always;
   add_header X-Content-Type-Options "nosniff" always;
   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
   add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
   add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

   # Static assets cache
   location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
       expires 30d;
       add_header Cache-Control "public, immutable";
   }

   # Auth API (strict rate limit)
   location /api/v1/auth/ {
       limit_req zone=auth burst=3 nodelay;
       proxy_pass http://backend;
       proxy_http_version 1.1;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
   }

   # API proxy
   location /api/ {
       limit_req zone=api burst=20 nodelay;
       proxy_pass http://backend;
       proxy_http_version 1.1;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
   }

   # WebSocket proxy
   location /ws/ {
       proxy_pass http://backend;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_read_timeout 86400;
   }

   # Uploads static files
   location /uploads/ {
       alias /data/uploads/;
       expires 7d;
       add_header Cache-Control "public";
   }

   # Serve client static files
   location / {
       root /usr/share/nginx/html;
       try_files $uri $uri/ /index.html;
   }
}
}

sonar.projectKey=topivra
sonar.projectName=TopiVra
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=server/src,client/src
sonar.tests=server/test,client/src/__tests__,e2e/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx

# Test coverage
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/test/**,**/__tests__/**

# TypeScript
sonar.typescript.node=node

# Code quality
sonar.qualitygate.wait=true

# Duplications
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts

# Language
sonar.sourceEncoding=UTF-8



